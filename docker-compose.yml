services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rehorse}
      POSTGRES_USER: ${POSTGRES_USER:-rehorse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rehorse_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"   # host:container — expose for local migration script
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rehorse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rehorse:
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rehorse}:${POSTGRES_PASSWORD:-rehorse_password}@postgres:5432/${POSTGRES_DB:-rehorse}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      VAPID_EMAIL: ${VAPID_EMAIL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      CRON_SECRET: ${CRON_SECRET}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  cron:
    image: alpine
    restart: unless-stopped
    environment:
      - CRON_SECRET=${CRON_SECRET}
    command: >
      sh -c "apk add --no-cache curl -q &&
             while true; do
               sleep 60;
               [ \"$$(date +%H%M)\" = '0900' ] &&
               curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" http://rehorse:3000/api/cron/rehearsal-reminder;
             done"
    depends_on:
      - rehorse

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - rehorse

volumes:
  postgres_data:
